services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: site-availability-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./screenshots:/app/screenshots
    networks:
      - app-network

  nginx:
    image: nginx:stable-alpine
    container_name: site-availability-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - bot
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
