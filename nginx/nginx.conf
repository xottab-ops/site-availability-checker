server {
    listen 80;
    server_name _;

    charset utf-8;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Корневой маршрут
    location = / {
        default_type text/plain;
        return 200 "Site Availability Telegram Bot is running.\n";
    }

    # Health check
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "OK\n";
    }

    # ──────────────────────────────────────────────────
    # 4xx — ошибки клиента
    # ──────────────────────────────────────────────────

    location = /400 {
        default_type application/json;
        return 400 '{"status":400,"error":"Bad Request","message":"The server could not understand the request due to invalid syntax."}';
    }
    location = /401 {
        default_type application/json;
        return 401 '{"status":401,"error":"Unauthorized","message":"Authentication is required and has failed or has not been provided."}';
    }
    location = /402 {
        default_type application/json;
        return 402 '{"status":402,"error":"Payment Required","message":"Payment is required to access this resource."}';
    }
    location = /403 {
        default_type application/json;
        return 403 '{"status":403,"error":"Forbidden","message":"You do not have permission to access this resource."}';
    }
    location = /404 {
        default_type application/json;
        return 404 '{"status":404,"error":"Not Found","message":"The requested resource could not be found."}';
    }
    location = /405 {
        default_type application/json;
        return 405 '{"status":405,"error":"Method Not Allowed","message":"The HTTP method is not allowed for this endpoint."}';
    }
    location = /406 {
        default_type application/json;
        return 406 '{"status":406,"error":"Not Acceptable","message":"The server cannot produce a response matching the Accept headers."}';
    }
    location = /407 {
        default_type application/json;
        return 407 '{"status":407,"error":"Proxy Authentication Required","message":"Authentication with the proxy is required."}';
    }
    location = /408 {
        default_type application/json;
        return 408 '{"status":408,"error":"Request Timeout","message":"The server timed out waiting for the request."}';
    }
    location = /409 {
        default_type application/json;
        return 409 '{"status":409,"error":"Conflict","message":"The request conflicts with the current state of the server."}';
    }
    location = /410 {
        default_type application/json;
        return 410 '{"status":410,"error":"Gone","message":"The requested resource is no longer available and will not be available again."}';
    }
    location = /411 {
        default_type application/json;
        return 411 '{"status":411,"error":"Length Required","message":"The Content-Length header is required for this request."}';
    }
    location = /412 {
        default_type application/json;
        return 412 '{"status":412,"error":"Precondition Failed","message":"One or more conditions in the request headers evaluated to false."}';
    }
    location = /413 {
        default_type application/json;
        return 413 '{"status":413,"error":"Payload Too Large","message":"The request payload exceeds the server limit."}';
    }
    location = /414 {
        default_type application/json;
        return 414 '{"status":414,"error":"URI Too Long","message":"The requested URI is longer than the server is willing to interpret."}';
    }
    location = /415 {
        default_type application/json;
        return 415 '{"status":415,"error":"Unsupported Media Type","message":"The media type of the request is not supported."}';
    }
    location = /416 {
        default_type application/json;
        return 416 '{"status":416,"error":"Range Not Satisfiable","message":"The range specified in the Range header cannot be fulfilled."}';
    }
    location = /417 {
        default_type application/json;
        return 417 '{"status":417,"error":"Expectation Failed","message":"The server cannot meet the requirements of the Expect request header."}';
    }
    location = /418 {
        default_type application/json;
        return 418 '{"status":418,"error":"I am a teapot","message":"The server refuses to brew coffee because it is a teapot."}';
    }
    location = /421 {
        default_type application/json;
        return 421 '{"status":421,"error":"Misdirected Request","message":"The request was directed at a server that cannot produce a response."}';
    }
    location = /422 {
        default_type application/json;
        return 422 '{"status":422,"error":"Unprocessable Entity","message":"The request was well-formed but contains semantic errors."}';
    }
    location = /423 {
        default_type application/json;
        return 423 '{"status":423,"error":"Locked","message":"The resource that is being accessed is locked."}';
    }
    location = /424 {
        default_type application/json;
        return 424 '{"status":424,"error":"Failed Dependency","message":"The request failed due to a failure of a previous request."}';
    }
    location = /425 {
        default_type application/json;
        return 425 '{"status":425,"error":"Too Early","message":"The server is unwilling to risk processing a request that might be replayed."}';
    }
    location = /426 {
        default_type application/json;
        return 426 '{"status":426,"error":"Upgrade Required","message":"The client should switch to the protocol specified in the Upgrade header."}';
    }
    location = /428 {
        default_type application/json;
        return 428 '{"status":428,"error":"Precondition Required","message":"The server requires the request to be conditional."}';
    }
    location = /429 {
        default_type application/json;
        return 429 '{"status":429,"error":"Too Many Requests","message":"You have sent too many requests in a given amount of time. Please slow down."}';
    }
    location = /431 {
        default_type application/json;
        return 431 '{"status":431,"error":"Request Header Fields Too Large","message":"The server is unwilling to process the request because its header fields are too large."}';
    }
    location = /451 {
        default_type application/json;
        return 451 '{"status":451,"error":"Unavailable For Legal Reasons","message":"Access to this resource is denied for legal reasons."}';
    }

    # ──────────────────────────────────────────────────
    # 5xx — ошибки сервера
    # ──────────────────────────────────────────────────

    location = /500 {
        default_type application/json;
        return 500 '{"status":500,"error":"Internal Server Error","message":"The server encountered an unexpected condition that prevented it from fulfilling the request."}';
    }
    location = /501 {
        default_type application/json;
        return 501 '{"status":501,"error":"Not Implemented","message":"The server does not support the functionality required to fulfill the request."}';
    }
    location = /502 {
        default_type application/json;
        return 502 '{"status":502,"error":"Bad Gateway","message":"The server received an invalid response from an upstream server."}';
    }
    location = /503 {
        default_type application/json;
        return 503 '{"status":503,"error":"Service Unavailable","message":"The server is temporarily unable to handle the request. Please try again later."}';
    }
    location = /504 {
        default_type application/json;
        return 504 '{"status":504,"error":"Gateway Timeout","message":"The upstream server did not respond in time."}';
    }
    location = /505 {
        default_type application/json;
        return 505 '{"status":505,"error":"HTTP Version Not Supported","message":"The HTTP version used in the request is not supported by the server."}';
    }
    location = /506 {
        default_type application/json;
        return 506 '{"status":506,"error":"Variant Also Negotiates","message":"The server has an internal configuration error during content negotiation."}';
    }
    location = /507 {
        default_type application/json;
        return 507 '{"status":507,"error":"Insufficient Storage","message":"The server is unable to store the representation needed to complete the request."}';
    }
    location = /508 {
        default_type application/json;
        return 508 '{"status":508,"error":"Loop Detected","message":"The server detected an infinite loop while processing the request."}';
    }
    location = /510 {
        default_type application/json;
        return 510 '{"status":510,"error":"Not Extended","message":"Further extensions to the request are required for the server to fulfill it."}';
    }
    location = /511 {
        default_type application/json;
        return 511 '{"status":511,"error":"Network Authentication Required","message":"Network authentication is required to access this resource."}';
    }
}
